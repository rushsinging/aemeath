[workspace]
resolver = "2"
members = [
    "apps/cli",
    "services/core",
    "services/runtime",
    "services/project",
    "services/policy",
    "services/prompt",
    "services/provider",
    "services/tools",
    "services/share",
    "services/storage",
    "services/hook",
    "services/audit",
]

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
thiserror = "2"
tokio-util = { version = "0.7", features = ["io", "codec", "rt"] }
futures-util = "0.3"
chrono = "0.4"
reqwest = { version = "0.12", features = ["stream"] }
inventory = "0.3"
