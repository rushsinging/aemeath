name: Coverage

# 所有 PR 都跑 coverage：ruleset（main-branch-protection.json）将
# "Workspace coverage summary" 设为 required_status_checks，若用 paths 过滤会让
# 只改非匹配路径（如 .agents/hooks/*.sh）的 PR 永不触发该 check → 永远 pending → 卡死。
# 见 #1220 配套讨论。
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Workspace coverage summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
          workspaces: '. -> target/coverage'

      - name: Install cargo-llvm-cov 0.8.7
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked

      - name: Print workspace and per-crate coverage
        run: ./scripts/coverage.sh
