name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (e.g. 0.8.3)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Job 1: 版本一致性校验 + 发布前门禁 ──────────────────────────
  validate:
    name: Validate & Gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Resolve release version
        id: version
        run: |
          # 从触发来源提取版本号（git tag 或 workflow_dispatch 输入）
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "Release version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  # ── Job 2: macOS 双架构构建 ─────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: validate
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14          # Apple Silicon runner (native)
          - target: x86_64-apple-darwin
            runner: macos-14          # Apple Silicon runner (cross-compile)
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        # 显式注入 AEMEATH_VERSION，使二进制内嵌正确的版本号。
        # 版本号由 validate job 从 git tag / workflow_dispatch 输入解析（见
        # outputs.version）。build.rs 不再从 git 历史读取版本号，本地 dev build
        # 默认 0.0.0；发布版本必须在此显式注入。
        env:
          AEMEATH_VERSION: ${{ needs.validate.outputs.version }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          TARGET="${{ matrix.target }}"
          DIRNAME="aemeath-${VERSION}-${TARGET}"

          mkdir "$DIRNAME"
          cp "target/${TARGET}/release/aemeath" "$DIRNAME/aemeath"
          tar czf "${DIRNAME}.tar.gz" "$DIRNAME"
          echo "Packaged: ${DIRNAME}.tar.gz"
          ls -lh "${DIRNAME}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aemeath-${{ matrix.target }}
          path: aemeath-*.tar.gz

  # ── Job 3: 生成 checksums + 创建 GitHub Release ─────────────────
  release:
    name: Create Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum aemeath-*.tar.gz > ../checksums.txt
          echo "=== checksums.txt ==="
          cat ../checksums.txt

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ needs.validate.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/aemeath-*.tar.gz
            checksums.txt
