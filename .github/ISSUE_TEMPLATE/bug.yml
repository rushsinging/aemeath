name: Bug report
description: Report a defect — something is broken
title: "[Bug] "
labels: ["kind:bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: One or more affected subsystems. Each selection auto-applies the corresponding `area:*` label.
      multiple: true
      options:
        - cli
        - runtime
        - tools
        - provider
        - prompt
        - project
        - storage
        - policy
        - hook
        - audit
        - update
        - shared
        - composition
        - sdk
        - logging
        - specs
        - docs
        - github
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Informs prioritization; auto-applies the corresponding `priority:*` label when chosen.
      multiple: false
      options:
        - high
        - medium
        - low
    validations:
      required: false
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce, or a link to a failing run / test.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version (`rustc --version`), commit SHA, and any relevant env vars.
    validations:
      required: true
  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs Actual
    validations:
      required: true
  - type: textarea
    id: doc-code-verification
    attributes:
      label: 文档与代码双向校验门禁
      description: >-
        涉及 `docs/design/**` 目标文档的改动 MUST 逐项执行；纯环境/配置 bug 可标 N/A。
        完整流程参见 AGENTS.md「Bug/Feature 执行流程」。
      value: |
        <!-- doc-code-verification-gate:v1 -->

        - [ ] **开发前**：列出对应 Target 文档章节、当前代码路径、不符合点；文档矛盾/过期/不可行先修正文档
        - [ ] **开发中**：范围/类型/端口/状态机/错误语义变化时同步校对文档；代码与文档使用同一术语
        - [ ] **完成前**：差异清单逐项更新为 已对齐/已修正文档/经确认延期；PR Test plan 列出已核对文档与守卫命令
    validations:
      required: false
  - type: textarea
    id: test-strategy
    attributes:
      label: 测试策略
      description: >-
        单元/场景测试应遵守 `docs/design/03-engineering/04-testing-and-coverage.md`
        六层测试模型（L0–L5）。Bug 修复 MUST 先写复现问题的失败测试，再修代码。
      value: |
        参见 `docs/design/03-engineering/04-testing-and-coverage.md`。

        适用层级：
        - [ ] L1 单元测试
        - [ ] L2 模块协作测试
        - [ ] L3 契约测试
        - [ ] L4 场景测试
        - [ ] L5 系统 smoke
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Logs, screenshots, or references to related issues / specs.
