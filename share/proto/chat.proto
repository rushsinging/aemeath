syntax = "proto3";

package aemeath.v1;

import "common.proto";

service ChatService {
  rpc CreateChat(CreateChatRequest) returns (CreateChatResponse);
  rpc AddMessage(AddMessageRequest) returns (AddMessageResponse);
  rpc GetChat(GetChatRequest) returns (GetChatResponse);
  rpc ListChats(ListChatsRequest) returns (ListChatsResponse);
  rpc DeleteChat(DeleteChatRequest) returns (Empty);
  rpc Watch(WatchRequest) returns (stream ChatEvent);
}

message Chat {
  string id = 1;
  string workspace_id = 2;
  string title = 3;
  string status = 4;
  string created_at = 5;
  string updated_at = 6;
  int64 version = 7;
}

message ChatMessage {
  string id = 1;
  string chat_id = 2;
  string workspace_id = 3;
  string sender_type = 4;
  string role = 5;
  string content = 6;
  string idempotency_key = 7;
  string created_at = 8;
  string updated_at = 9;
  int64 version = 10;
}

message CreateChatRequest {
  string workspace_id = 1;
  string title = 2;
}

message CreateChatResponse {
  Chat chat = 1;
}

message AddMessageRequest {
  string workspace_id = 1;
  string chat_id = 2;
  string role = 3;
  string content = 4;
  string idempotency_key = 5;
}

message AddMessageResponse {
  ChatMessage message = 1;
  bool deduplicated = 2;
}

message GetChatRequest {
  string workspace_id = 1;
  string chat_id = 2;
}

message GetChatResponse {
  Chat chat = 1;
}

message ListChatsRequest {
  string workspace_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListChatsResponse {
  repeated Chat chats = 1;
  string next_page_token = 2;
}

message DeleteChatRequest {
  string workspace_id = 1;
  string chat_id = 2;
}

message ChatEvent {
  string workspace_id = 1;
  string snapshot_id = 2;
  repeated Chat changed_chats = 3;
  repeated ChatMessage new_messages = 4;
  repeated string removed_chat_ids = 5;
}
