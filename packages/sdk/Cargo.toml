[package]
name = "sdk"
version.workspace = true
edition.workspace = true

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
bitflags = "2"
uuid = { version = "1", features = ["v5", "v7", "serde"] }
thiserror = { workspace = true }
utils = { path = "../global/utils" }
# Tool result DTO ownership moved from share::tool to the tools Published Language
# in #993. SDK re-exports those stable DTOs for CLI/future server consumers.
# The direct edge is explicitly constrained by the workspace dependency guard.
share = { path = "../../agent/shared" }
tools = { path = "../../agent/features/tools" }
libc = "0.2"

[dev-dependencies]
tempfile = "3"