# so the TUI (and any future server consumer) can read typed payloads
# without depending on the business layer (`agent/features/tools`).
# See `docs/superpowers/plans/2026-06-18-tool-display-structured-data.md`
# Phase 0a (方案 D) for the full design.
share = { path = "../../agent/shared" }