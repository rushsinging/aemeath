# 本地开发环境
# 启动：docker compose -f infra/deploy/docker-compose.dev.yaml up -d
# Server 推荐在宿主机 cargo run，方便热重载和断点调试
#   cargo run -p server -- --config agents/roles/

version: "3.9"

services:
  # ---------- MongoDB ----------
  mongo:
    image: mongo:7.0
    container_name: aemeath-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: aemeath
    volumes:
      - mongo_data:/data/db
      - ../mongodb/init-collections.js:/docker-entrypoint-initdb.d/01-init.js:ro
      - ../mongodb/seed.js:/docker-entrypoint-initdb.d/02-seed.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------- Gateway (nginx) ----------
  gateway:
    image: nginx:1.27-alpine
    container_name: aemeath-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      mongo:
        condition: service_healthy
    # 如果 Server 在宿主机跑，用 host.docker.internal 或 host 网络
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---------- Server（开发时按需启用，默认宿主机 cargo run）----------
  # server:
  #   build:
  #     context: ../../
  #     dockerfile: infra/deploy/Dockerfile
  #   container_name: aemeath-server
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"   # REST
  #     - "50051:50051" # gRPC
  #   environment:
  #     AEMEATH_MONGO_URI: mongodb://mongo:27017
  #     AEMEATH_MONGO_DB: aemeath
